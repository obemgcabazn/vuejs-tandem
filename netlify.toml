# Netlify — сборка из ветки main
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: все маршруты ведут на index.html (Vue Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
